# This workflow will test that the alembic migrations apply forwards and backwards.

name: Test Alembic Migrations

on:
  push:
  pull_request:
    types: [opened]
jobs:
  migrations:
    name: ⚗ Test Alembic Migrations
    runs-on: ubuntu-latest
    env:
      SQLALCHEMY_DATABASE_URI: postgresql://postgres:secret@localhost:5432
      POSTGRESQL_PASSWORD: secret
      SENDGRID_API_KEY: unused
      SHOPIFY_HMAC_SECRET: unused
      SECRET_KEY: unused
    steps:
    - uses: actions/checkout@v6
    - name: ➕ Install poetry
      uses: snok/install-poetry@v1
    - name: 🐍 Set up Python
      id: python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: 'poetry'
    - name: 🗄 Set up PostgreSQL
      uses: danielweller-swp/postgresql-action@v2
      with:
        postgresql version: '16'  # See https://hub.docker.com/_/postgres for available versions
        postgresql user: postgres
        postgresql password: secret
    - name: 🔧 Install dependencies
      run: poetry install --no-interaction --no-root
    - name: 🔎 Check connection to PostgreSQL
      run: |
        source $(poetry env info --path)/bin/activate
        python -m app.db.check_can_connect_to_db
    - name: ⚡ Run forward migrations
      run: |
        poetry run alembic upgrade head
    - name: ⚡ Run backwards migrations
      run: |
        poetry run alembic downgrade -10
    - name: ⚡ Retest forward migrations
      run: |
        poetry run alembic upgrade head
    - name: Install pgroles
      env:
        PGROLES_VERSION: "0.1.5"
      run: |
        curl -sL "https://github.com/hardbyte/pgroles/releases/download/v${PGROLES_VERSION}/pgroles-v${PGROLES_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz --strip-components=1
        chmod +x pgroles
        ./pgroles --version
    - name: Validate pgroles manifest
      run: ./pgroles validate --file pgroles.yaml
    - name: Check role drift (dry run)
      run: |
        ./pgroles diff \
          --database-url "postgresql://postgres:secret@localhost:5432" \
          --file pgroles.yaml \
          --format summary
        ./pgroles diff \
          --database-url "postgresql://postgres:secret@localhost:5432" \
          --file pgroles.yaml \
          --format sql \
          --no-exit-code
