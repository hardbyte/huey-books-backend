# pgroles manifest for wriveted-api
#
# Declarative role management for the Wriveted API database.
# See #607 for the expand/contract rollout history.
#
# Roles:
#   postgres    — superuser, owns all objects, runs migrations + pgroles
#   cloudrun    — application runtime (Cloud Run), DML via public-app
#   readonly    — analytics/debugging, SELECT-only via public-readonly
#
# The `postgres` user runs migrations and owns all objects, so it is the
# default_owner for default-privilege grants.

default_owner: postgres

profiles:
  app:
    grants:
      - on: { type: schema }
        privileges: [USAGE]
      - on: { type: table, name: "*" }
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on: { type: materialized_view, name: "*" }
        privileges: [SELECT]
      - on: { type: sequence, name: "*" }
        privileges: [USAGE, SELECT]
      - on: { type: function, name: "*" }
        privileges: [EXECUTE]
    default_privileges:
      - on_type: table
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on_type: sequence
        privileges: [USAGE, SELECT]
      - on_type: function
        privileges: [EXECUTE]

  readonly:
    grants:
      - on: { type: schema }
        privileges: [USAGE]
      - on: { type: table, name: "*" }
        privileges: [SELECT]
      - on: { type: materialized_view, name: "*" }
        privileges: [SELECT]
      - on: { type: sequence, name: "*" }
        privileges: [SELECT]
    default_privileges:
      - on_type: table
        privileges: [SELECT]
      - on_type: sequence
        privileges: [SELECT]

schemas:
  - name: public
    profiles: [app, readonly]

roles:
  - name: cloudrun
    login: true
    comment: "Application runtime role for Cloud Run services"
  - name: readonly
    login: true
    comment: "Read-only access for debugging and analytics"

memberships:
  - role: public-app
    members:
      - name: cloudrun
  - role: public-readonly
    members:
      - name: readonly
