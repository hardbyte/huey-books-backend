# pgroles manifest for wriveted-api
#
# Roles:
#   postgres      — superuser, owns all objects, runs migrations (not managed by pgroles)
#   cloudrun      — application runtime (API + internal services)
#   readonly      — read-only access for debugging/analytics
#
# The `postgres` user runs migrations and owns all objects, so it is the
# default_owner for default-privilege grants. pgroles doesn't manage
# postgres itself (it's a superuser), but we set default privileges so
# that objects created by postgres are automatically accessible to the
# profile roles.

default_owner: postgres

profiles:
  app:
    grants:
      - on: { type: schema }
        privileges: [USAGE]
      - on: { type: table, name: "*" }
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on: { type: materialized_view, name: "*" }
        privileges: [SELECT]
      - on: { type: sequence, name: "*" }
        privileges: [USAGE, SELECT]
      - on: { type: function, name: "*" }
        privileges: [EXECUTE]
    default_privileges:
      - on_type: table
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on_type: sequence
        privileges: [USAGE, SELECT]
      - on_type: function
        privileges: [EXECUTE]

  readonly:
    grants:
      - on: { type: schema }
        privileges: [USAGE]
      - on: { type: table, name: "*" }
        privileges: [SELECT]
      - on: { type: materialized_view, name: "*" }
        privileges: [SELECT]
      - on: { type: sequence, name: "*" }
        privileges: [SELECT]
    default_privileges:
      - on_type: table
        privileges: [SELECT]
      - on_type: sequence
        privileges: [SELECT]

schemas:
  - name: public
    profiles: [app, readonly]

roles:
  - name: cloudrun
    login: true
    comment: "Application runtime user for API and internal services"
  - name: readonly
    login: true
    comment: "Read-only access for debugging and analytics"

memberships:
  - role: public-app
    members:
      - name: cloudrun
  - role: public-readonly
    members:
      - name: readonly
