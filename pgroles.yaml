# pgroles manifest for wriveted-api
#
# Expand/contract rollout (see #607):
#   Phase 1 (this) — additive only. Create new group roles and grant
#     memberships. Existing direct grants on `cloudrun` are untouched
#     because `cloudrun` is not in the `roles` section (treated as
#     external). The `readonly` login role is new.
#   Phase 2 — apply to prod.
#   Phase 3 — update apps to use new role structure.
#   Phase 4 — retire direct grants on `cloudrun`, manage it via pgroles.
#
# The `postgres` user runs migrations and owns all objects, so it is the
# default_owner for default-privilege grants.

default_owner: postgres

profiles:
  app:
    grants:
      - on: { type: schema }
        privileges: [USAGE]
      - on: { type: table, name: "*" }
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on: { type: materialized_view, name: "*" }
        privileges: [SELECT]
      - on: { type: sequence, name: "*" }
        privileges: [USAGE, SELECT]
      - on: { type: function, name: "*" }
        privileges: [EXECUTE]
    default_privileges:
      - on_type: table
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on_type: sequence
        privileges: [USAGE, SELECT]
      - on_type: function
        privileges: [EXECUTE]

  readonly:
    grants:
      - on: { type: schema }
        privileges: [USAGE]
      - on: { type: table, name: "*" }
        privileges: [SELECT]
      - on: { type: materialized_view, name: "*" }
        privileges: [SELECT]
      - on: { type: sequence, name: "*" }
        privileges: [SELECT]
    default_privileges:
      - on_type: table
        privileges: [SELECT]
      - on_type: sequence
        privileges: [SELECT]

schemas:
  - name: public
    profiles: [app, readonly]

# Only new roles here. `cloudrun` already exists in prod and is not
# managed by pgroles yet — its existing direct grants stay untouched.
roles:
  - name: readonly
    login: true
    comment: "Read-only access for debugging and analytics"

# `cloudrun` is referenced as an external member — pgroles only manages
# the membership edge, not the role or its existing grants.
memberships:
  - role: public-app
    members:
      - name: cloudrun
  - role: public-readonly
    members:
      - name: readonly
